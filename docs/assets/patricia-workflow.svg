<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Patricia workflow</title><desc id="desc">Workflow from document intake to citation-backed answer.</desc>
<rect width="1200" height="420" rx="32" fill="#FFF7ED"/>
<path d="M0 330C180 270 330 390 510 330C690 270 780 160 960 210C1080 245 1140 190 1200 150V420H0V330Z" fill="#FDBA74" opacity="0.35"/>
<g font-family="Inter,Arial,sans-serif">
<text x="54" y="68" fill="#7C2D12" font-size="34" font-weight="850">How Patricia should think</text>
<text x="54" y="102" fill="#9A3412" font-size="17">Extract first. Support claims second. Explain last. Never pretend.</text>
<g transform="translate(54 155)">
<rect width="190" height="120" rx="24" fill="#FFFFFF" stroke="#FED7AA" stroke-width="2"/>
<text x="26" y="46" fill="#111827" font-size="18" font-weight="800">1. Intake</text>
<text x="26" y="78" fill="#64748B" font-size="14">Paste, text file, or</text><text x="26" y="100" fill="#64748B" font-size="14">trusted URL import</text>
</g>
<g transform="translate(288 155)">
<rect width="190" height="120" rx="24" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
<text x="26" y="46" fill="#1E3A8A" font-size="18" font-weight="800">2. Classify</text>
<text x="26" y="78" fill="#1D4ED8" font-size="14">Jurisdiction, intent,</text><text x="26" y="100" fill="#1D4ED8" font-size="14">document type</text>
</g>
<g transform="translate(522 155)">
<rect width="190" height="120" rx="24" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="2"/>
<text x="26" y="46" fill="#14532D" font-size="18" font-weight="800">3. Extract</text>
<text x="26" y="78" fill="#15803D" font-size="14">Facts, issues, orders,</text><text x="26" y="100" fill="#15803D" font-size="14">clauses, deadlines</text>
</g>
<g transform="translate(756 155)">
<rect width="190" height="120" rx="24" fill="#FAF5FF" stroke="#E9D5FF" stroke-width="2"/>
<text x="26" y="46" fill="#581C87" font-size="18" font-weight="800">4. Verify</text>
<text x="26" y="78" fill="#7E22CE" font-size="14">Ledger, confidence,</text><text x="26" y="100" fill="#7E22CE" font-size="14">unsupported claim removal</text>
</g>
<g transform="translate(990 155)">
<rect width="156" height="120" rx="24" fill="#FEFCE8" stroke="#FEF08A" stroke-width="2"/>
<text x="22" y="46" fill="#713F12" font-size="18" font-weight="800">5. Explain</text>
<text x="22" y="78" fill="#A16207" font-size="14">Plain-language</text><text x="22" y="100" fill="#A16207" font-size="14">cited answer</text>
</g>
<path d="M254 215H278M488 215H512M722 215H746M956 215H980" stroke="#EA580C" stroke-width="4" stroke-linecap="round"/>
</g>
</svg>