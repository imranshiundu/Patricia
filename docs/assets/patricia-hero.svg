<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Patricia public document intelligence hero</title>
  <desc id="desc">A colorful hero illustration showing Patricia translating complex public documents into clear, cited explanations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.45" stop-color="#172554"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F0ABFC"/>
      <stop offset="1" stop-color="#DB2777"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="44" fill="url(#bg)"/>
  <circle cx="1040" cy="70" r="160" fill="#38BDF8" opacity="0.18"/>
  <circle cx="170" cy="440" r="190" fill="#F97316" opacity="0.16"/>
  <circle cx="785" cy="465" r="120" fill="#A855F7" opacity="0.18"/>

  <g transform="translate(78 76)">
    <rect x="0" y="0" width="510" height="365" rx="34" fill="white" opacity="0.98" filter="url(#softShadow)"/>
    <rect x="38" y="36" width="142" height="16" rx="8" fill="#CBD5E1"/>
    <rect x="38" y="74" width="360" height="22" rx="11" fill="#0F172A"/>
    <rect x="38" y="116" width="430" height="10" rx="5" fill="#E2E8F0"/>
    <rect x="38" y="138" width="390" height="10" rx="5" fill="#E2E8F0"/>
    <rect x="38" y="160" width="410" height="10" rx="5" fill="#E2E8F0"/>
    <rect x="38" y="202" width="202" height="72" rx="22" fill="#EFF6FF" stroke="#BFDBFE"/>
    <rect x="265" y="202" width="202" height="72" rx="22" fill="#FFF7ED" stroke="#FED7AA"/>
    <rect x="64" y="229" width="145" height="10" rx="5" fill="#2563EB"/>
    <rect x="291" y="229" width="130" height="10" rx="5" fill="#F97316"/>
    <rect x="38" y="306" width="430" height="24" rx="12" fill="#0F172A"/>
  </g>

  <g transform="translate(618 72)" filter="url(#softShadow)">
    <rect x="0" y="0" width="500" height="372" rx="36" fill="#020617" opacity="0.88"/>
    <rect x="32" y="30" width="118" height="30" rx="15" fill="url(#cyan)"/>
    <text x="91" y="51" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="white">VERIFIED</text>
    <text x="32" y="108" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" fill="white">Plain-language</text>
    <text x="32" y="153" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900" fill="white">public intelligence</text>
    <text x="34" y="194" font-family="Inter, Arial, sans-serif" font-size="16" fill="#CBD5E1">Policies, laws, judgments and civic documents</text>
    <text x="34" y="218" font-family="Inter, Arial, sans-serif" font-size="16" fill="#CBD5E1">turned into clear, cited, useful explanations.</text>

    <g transform="translate(32 256)">
      <rect width="132" height="58" rx="20" fill="url(#orange)"/>
      <text x="66" y="34" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" fill="#111827">Decode</text>
    </g>
    <g transform="translate(182 256)">
      <rect width="132" height="58" rx="20" fill="url(#cyan)"/>
      <text x="66" y="34" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" fill="white">Cite</text>
    </g>
    <g transform="translate(332 256)">
      <rect width="132" height="58" rx="20" fill="url(#pink)"/>
      <text x="66" y="34" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" fill="white">Explain</text>
    </g>
  </g>

  <path d="M560 255 C590 225 610 225 640 255" stroke="#67E8F9" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <circle cx="603" cy="244" r="7" fill="#FACC15"/>
</svg>
